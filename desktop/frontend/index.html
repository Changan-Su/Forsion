<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:* https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://liteapp.weixin.qq.com;" />
    <title>Tangu Agent</title>
    <script>
      // FOUC 防护:React 挂载前按 localStorage 设 data-theme/.dark/data-glass,
      // 避免主题/暗色闪烁。preset 合法性由 registry 启动后兜底纠正。
      (function () {
        try {
          var preset = localStorage.getItem('forsion_theme_preset') || 'lovable';
          var mode = localStorage.getItem('forsion_theme') === 'dark' ? 'dark' : 'light';
          var glass = localStorage.getItem('forsion_glass') === 'off' ? 'off' : 'on';
          var flat = localStorage.getItem('forsion_theme_flat') === '1' ? '1' : '0';
          var root = document.documentElement;
          // 退役/合成皮肤(旧 sozhi/monet、custom)首帧骑 lovable 基底,registry 启动后纠正。
          var cssTheme = (preset === 'lovable' || preset === 'echo' || preset === 'qbird' || preset === 'dreamer') ? preset : 'lovable';
          root.dataset.theme = cssTheme;
          root.dataset.mode = mode;
          root.dataset.glass = glass;
          root.dataset.flat = flat;
          if (mode === 'dark') root.classList.add('dark');
          // 首帧背景:lovable 奶油底 / 暖夜黑;dreamer 渐变底色差异大,单独给底防紫色闪烁(其它皮肤由其 CSS 接管)。
          root.style.background = cssTheme === 'dreamer'
            ? (mode === 'dark' ? '#1b1726' : '#f3eef7')
            : (mode === 'dark' ? '#1c1a16' : '#f7f4ed');
        } catch (e) { /* private mode */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
